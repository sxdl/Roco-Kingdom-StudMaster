    <div class="result-card">

    </div>

    <div id="studMatchPanel" style="display:none;" class="stud-list">
        <h3>✨ 可与该宠物孵蛋的优质种公 ✨</h3>
        <p style="font-size:0.8rem; margin-bottom:8px;">💡 优先展示自身蛋组多的种公（蛋组越多，配种范围越广）</p>
        <div id="studMatchList"></div>
    </div>

    <div id="groupPetsPanel" style="display:none;">
        <h3>🐾 该蛋组包含的宠物</h3>
        <div id="groupPetsList"></div>
    </div>
</div>
<script src="data.js"></script>
<script src="common.js"></script>
<script>
    refreshData();
    const petInput = document.getElementById('petInput');
    const searchBtn = document.getElementById('searchBtn');
    const randomBtn = document.getElementById('randomBtn');
    const resultBadges = document.getElementById('resultBadges');
    const groupPetsPanel = document.getElementById('groupPetsPanel');
    const groupPetsList = document.getElementById('groupPetsList');
    const autocompleteDiv = document.getElementById('autocompleteList');
    const studMatchPanel = document.getElementById('studMatchPanel');
    const studMatchList = document.getElementById('studMatchList');

    let allPetNames = getAllPetNames();

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 替换原来的 findMatchStuds 函数（在 index.html 的 script 中）
function findMatchStuds(currentPetName, currentPetGroups) {
    const currentSet = new Set(currentPetGroups);
    const candidates = [];
    for (let [key, entry] of petToGroups.entries()) {
        if (entry.name === currentPetName) continue;
        const petGroupsSet = entry.groups;
        const common = [];
        for (let g of petGroupsSet) {
            if (currentSet.has(g)) common.push(g);
        }
        if (common.length > 0) {
            candidates.push({
                name: entry.name,
                totalGroups: petGroupsSet.size,
                commonGroups: common,
                matchCount: getPetMatchCount(entry.name)   // 从 common.js 获取
            });
        }
    }
    // 排序：先按 matchCount 降序，再按 common 数量降序，再按 totalGroups 降序
    candidates.sort((a,b) => {
        if (a.matchCount !== b.matchCount) return b.matchCount - a.matchCount;
        if (a.commonGroups.length !== b.commonGroups.length) return b.commonGroups.length - a.commonGroups.length;
        return b.totalGroups - a.totalGroups;
    });
    return candidates;
}

    function renderResult(petName) {
        let groups = getPetGroups(petName);
        if (!groups.length) {
            resultBadges.innerHTML = `<div class="not-found">❓ 未找到 “${escapeHtml(petName)}” 的蛋组信息</div>`;
            groupPetsPanel.style.display = 'none';
            studMatchPanel.style.display = 'none';
            return;
        }
        let html = `<div class="pet-title">🐉 宠物：${escapeHtml(petName)}  · 共 ${groups.length} 个蛋组</div><div class="badge-group">`;
        groups.forEach(group => {
            html += `<span class="egg-badge" data-group="${escapeHtml(group)}">🧬 ${escapeHtml(group)}</span>`;
        });
        html += `</div>`;
        resultBadges.innerHTML = html;
        groupPetsPanel.style.display = 'none';

        document.querySelectorAll('.egg-badge').forEach(el => {
            el.addEventListener('click', (e) => {
                let groupName = el.getAttribute('data-group');
                let pets = getPetsByGroup(groupName);
                if (pets.length) {
                    groupPetsList.innerHTML = pets.map(p => `<span class="pet-chip">${escapeHtml(p)}</span>`).join('');
                    groupPetsPanel.style.display = 'block';
                } else {
                    groupPetsList.innerHTML = '暂无宠物';
                    groupPetsPanel.style.display = 'block';
                }
            });
        });

        const matchStuds = findMatchStuds(petName, groups);
        if (matchStuds.length === 0) {
            studMatchPanel.style.display = 'block';
            studMatchList.innerHTML = '<div class="no-stud">😢 抱歉，当前数据库中没有与该宠物拥有共同蛋组的其他宠物。<br>你可以通过「数据维护」页面添加更多种公。</div>';
        } else {
            studMatchPanel.style.display = 'block';
            let listHtml = '';
            matchStuds.forEach(stud => {
                const commonStr = stud.commonGroups.join('、');
                listHtml += `<span class="stud-item" data-pet="${escapeHtml(stud.name)}">
                                🧬 ${escapeHtml(stud.name)}
                                <span class="stud-count">${stud.totalGroups}蛋组</span>
                                <span class="common-groups" title="共同蛋组：${escapeHtml(commonStr)}">🎯 ${stud.commonGroups.length}共同</span>
                             </span>`;
            });
            studMatchList.innerHTML = listHtml;
            document.querySelectorAll('#studMatchList .stud-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    let pet = item.getAttribute('data-pet');
                    petInput.value = pet;
                    renderResult(pet);
                    autocompleteDiv.innerHTML = '';
                });
            });
        }
    }

    function showAutocomplete(filter) {
        autocompleteDiv.innerHTML = '';
        if (!filter) return;
        const lowerFilter = filter.toLowerCase();
        const matches = allPetNames.filter(name => name.toLowerCase().includes(lowerFilter)).slice(0, 10);
        if (matches.length === 0) return;
        const container = document.createElement('div');
        container.className = 'autocomplete-items';
        matches.forEach(match => {
            const item = document.createElement('div');
            item.className = 'autocomplete-item';
            item.textContent = match;
            item.addEventListener('click', () => {
                petInput.value = match;
                renderResult(match);
                autocompleteDiv.innerHTML = '';
            });
            container.appendChild(item);
        });
        autocompleteDiv.appendChild(container);
    }

    function randomPet() {
        if (allPetNames.length === 0) return;
        let rand = allPetNames[Math.floor(Math.random() * allPetNames.length)];
        petInput.value = rand;
        renderResult(rand);
    }

    petInput.addEventListener('input', (e) => showAutocomplete(e.target.value));
    petInput.addEventListener('blur', () => setTimeout(() => { autocompleteDiv.innerHTML = ''; }, 200));
    searchBtn.addEventListener('click', () => {
        let val = petInput.value.trim();
        if (val) renderResult(val);
        autocompleteDiv.innerHTML = '';
    });
    randomBtn.addEventListener('click', randomPet);
    petInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchBtn.click();
    });

    const urlParams = new URLSearchParams(window.location.search);
    const petParam = urlParams.get('pet');
    if (petParam) {
        petInput.value = petParam;
        renderResult(petParam);
    } else if (allPetNames.length) {
        let defaultPet = allPetNames.find(n => n.includes('粉星仔')) || allPetNames[0];
        petInput.value = defaultPet;
        renderResult(defaultPet);
    }
</script>
