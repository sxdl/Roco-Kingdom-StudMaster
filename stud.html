<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优质种公排行榜 · 配种广度优先</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .ranking-table th, .ranking-table td {
            text-align: left;
            padding: 10px 12px;
        }
        .match-count {
            font-weight: bold;
            color: #c97e0a;
        }
        .groups-count {
            color: #2b5e2f;
        }
        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pagination button, .pagination select {
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #cbdcc2;
            background: white;
            cursor: pointer;
            font-family: inherit;
        }
        .pagination button:hover {
            background: #eef5e8;
        }
        .pagination .active-page {
            background: #2b5e2f;
            color: white;
            border-color: #2b5e2f;
        }
        .page-size-selector {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: 20px;
        }
        .info-text {
            margin-top: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: #6f7c64;
        }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align:center; font-size:0.7rem; padding: 1rem; color: #6f7c64;">
    🧪 非商用工具 | 数据基于洛克王国 | 禁止用于盈利性目的
</div>
    <h1>🏆 优质种公排行榜</h1>
    <p>⚡ 排序规则：<strong>可配种宠物总数</strong>（能与之孵蛋的不同宠物数量）越多越优质，同等条件下蛋组数量越多越优。</p>
    <p>📌 仅统计拥有 <strong>至少2个蛋组</strong> 的宠物（单蛋组不视为种公）。</p>
    <div class="nav-links">
        <a href="index.html">← 返回查询</a>
        <a href="admin.html">📝 数据维护</a>
    </div>
    <table class="ranking-table" id="rankingTable">
        <thead>
            <tr><th>#</th><th>宠物名</th><th>可配种宠物总数</th><th>自身蛋组数</th><th>具体蛋组</th>
        </thead>
        <tbody id="rankingBody"></tbody>
    </table>

    <!-- 分页控件 -->
    <div class="pagination" id="paginationControls">
        <button id="firstPageBtn" title="首页">⏮️</button>
        <button id="prevPageBtn" title="上一页">◀</button>
        <span id="pageNumbers"></span>
        <button id="nextPageBtn" title="下一页">▶</button>
        <button id="lastPageBtn" title="末页">⏭️</button>
        <div class="page-size-selector">
            <span>每页显示：</span>
            <select id="pageSizeSelect">
                <option value="15">15</option>
                <option value="30">30</option>
                <option value="50">50</option>
                <option value="all">全部</option>
            </select>
        </div>
    </div>
    <div class="info-text" id="rangeInfo"></div>
</div>
<script src="data.js"></script>
<script src="common.js"></script>
<script>
    refreshData();          // 确保映射最新
    let ranking = getStudRanking();  // 已过滤蛋组数≥2并按 matchCount + groupsCount 排序
    let currentPage = 1;
    let pageSize = 15;      // 默认每页15条
    let totalPages = 1;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderTable() {
        const tbody = document.getElementById('rankingBody');
        if (!ranking.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">暂无符合条件（至少2个蛋组）的种公</td></tr>';
            document.getElementById('paginationControls').style.display = 'none';
            return;
        }
        document.getElementById('paginationControls').style.display = 'flex';

        let start = (currentPage - 1) * pageSize;
        let end = start + pageSize;
        if (pageSize === 'all') {
            start = 0;
            end = ranking.length;
        } else {
            if (start >= ranking.length) {
                currentPage = Math.max(1, Math.ceil(ranking.length / pageSize));
                start = (currentPage - 1) * pageSize;
                end = start + pageSize;
            }
            if (end > ranking.length) end = ranking.length;
        }

        const pageData = ranking.slice(start, end);
        let html = '';
        pageData.forEach((item, idx) => {
            const globalIndex = start + idx + 1;
            html += `<tr class="pet-row" data-pet="${escapeHtml(item.name)}">
                        <td>${globalIndex}</td>
                        <td><strong>${escapeHtml(item.name)}</strong></td>
                        <td><span class="match-count">✨ ${item.matchCount}</span> 只</td>
                        <td><span class="groups-count">📦 ${item.groupsCount}</span> 个</td>
                        <td>${item.groups.map(g => escapeHtml(g)).join(' · ')}</td>
                      </tr>`;
        });
        tbody.innerHTML = html;

        // 绑定点击行事件
        document.querySelectorAll('.pet-row').forEach(row => {
            row.addEventListener('click', () => {
                let pet = row.getAttribute('data-pet');
                window.location.href = `index.html?pet=${encodeURIComponent(pet)}`;
            });
        });

        // 更新分页信息
        updatePaginationInfo();
        renderPageNumbers();
    }

    function updatePaginationInfo() {
        let total = ranking.length;
        let start, end;
        if (pageSize === 'all') {
            start = 1;
            end = total;
            document.getElementById('rangeInfo').innerHTML = `显示第 1 - ${total} 条，共 ${total} 条`;
            return;
        }
        start = (currentPage - 1) * pageSize + 1;
        end = Math.min(currentPage * pageSize, total);
        document.getElementById('rangeInfo').innerHTML = `显示第 ${start} - ${end} 条，共 ${total} 条`;
    }

    function renderPageNumbers() {
        if (pageSize === 'all') {
            document.getElementById('pageNumbers').innerHTML = '';
            return;
        }
        totalPages = Math.ceil(ranking.length / pageSize);
        const container = document.getElementById('pageNumbers');
        container.innerHTML = '';
        // 显示最多 7 个页码（当前页前后各3个）
        let startPage = Math.max(1, currentPage - 3);
        let endPage = Math.min(totalPages, currentPage + 3);
        if (endPage - startPage < 6) {
            if (startPage === 1) endPage = Math.min(totalPages, startPage + 6);
            if (endPage === totalPages) startPage = Math.max(1, endPage - 6);
        }
        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            if (i === currentPage) btn.classList.add('active-page');
            btn.addEventListener('click', () => {
                currentPage = i;
                renderTable();
            });
            container.appendChild(btn);
        }
    }

    function goFirstPage() {
        if (pageSize === 'all') return;
        currentPage = 1;
        renderTable();
    }
    function goPrevPage() {
        if (pageSize === 'all') return;
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    }
    function goNextPage() {
        if (pageSize === 'all') return;
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
        }
    }
    function goLastPage() {
        if (pageSize === 'all') return;
        currentPage = totalPages;
        renderTable();
    }
    function changePageSize() {
        const select = document.getElementById('pageSizeSelect');
        let newSize = select.value;
        if (newSize === 'all') {
            pageSize = 'all';
            currentPage = 1;
            renderTable();
        } else {
            pageSize = parseInt(newSize, 10);
            currentPage = 1;
            renderTable();
        }
    }

    // 绑定事件
    document.getElementById('firstPageBtn').addEventListener('click', goFirstPage);
    document.getElementById('prevPageBtn').addEventListener('click', goPrevPage);
    document.getElementById('nextPageBtn').addEventListener('click', goNextPage);
    document.getElementById('lastPageBtn').addEventListener('click', goLastPage);
    document.getElementById('pageSizeSelect').addEventListener('change', changePageSize);

    // 初始化渲染
    renderTable();
</script>
</body>
</html>
