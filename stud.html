<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优质种公排行榜 · 配种广度优先</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .ranking-table th, .ranking-table td { text-align: left; padding: 10px 12px; }
        .match-count { font-weight: bold; color: #c97e0a; }
        .groups-count { color: #2b5e2f; }
        .pagination {
            margin-top: 20px; display: flex; justify-content: center;
            align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .pagination button, .pagination select {
            padding: 6px 12px; border-radius: 40px; border: 1px solid #cbdcc2;
            background: white; cursor: pointer; font-family: inherit;
        }
        .pagination button:hover { background: #eef5e8; }
        .pagination .active-page { background: #2b5e2f; color: white; border-color: #2b5e2f; }
        .page-size-selector { display: inline-flex; align-items: center; gap: 8px; margin-left: 20px; }
        .info-text { margin-top: 10px; text-align: center; font-size: 0.8rem; color: #6f7c64; }
        .data-status { text-align: center; font-size: 0.75rem; color: #6f7c64; padding: 4px; }
        .data-status.error { color: #d9534f; }
        .filter-bar {
            display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 0;
            align-items: center;
        }
        .filter-bar label { font-size: 0.9rem; font-weight: bold; color: #2b5e2f; }
        .filter-chip {
            display: inline-block; padding: 6px 14px; border-radius: 40px;
            border: 1px solid #cbdcc2; background: white; cursor: pointer;
            font-size: 0.85rem; transition: 0.15s; user-select: none;
        }
        .filter-chip:hover { background: #eef5e8; }
        .filter-chip.active { background: #2b5e2f; color: white; border-color: #2b5e2f; }
        .filter-actions {
            display: flex; gap: 8px; margin-left: auto;
        }
        .filter-actions button {
            padding: 6px 14px; border-radius: 40px; border: 1px solid #cbdcc2;
            background: white; cursor: pointer; font-size: 0.85rem;
        }
        .filter-actions button:hover { background: #eef5e8; }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align:center; font-size:0.7rem; padding: 1rem; color: #6f7c64;">
    🧪 非商用工具 | 数据基于洛克王国BWIKI | 禁止用于盈利性目的
    </div>
    <h1>🏆 优质种公排行榜</h1>
    <p>⚡ 排序规则：<strong>可配种宠物总数</strong>越多越优质，同等条件下蛋组数量越多越优。</p>
    <p>📌 仅统计拥有 <strong>至少2个蛋组</strong> 的宠物（单蛋组不视为种公）。</p>
    <div id="dataStatus" class="data-status">⏳ 正在加载蛋组数据…</div>
    <div class="filter-bar" id="filterBar" style="display:none;">
        <label>🥚 蛋组筛选：</label>
        <div id="filterChips"></div>
        <div class="filter-actions">
            <button id="clearFilterBtn" title="清除筛选">清除</button>
        </div>
    </div>
    <div class="nav-links">
        <a href="index.html">← 返回查询</a>
        <a href="stud-repo.html">📦 种公仓库</a>
        <span style="color:#6f7c64; font-size:0.8rem;">
            数据来源：<a href="https://wiki.biligame.com/rocom/" target="_blank" style="color:#2b5e2f;">BWIKI</a>
        </span>
    </div>
    <table class="ranking-table" id="rankingTable">
        <thead>
            <tr><th>#</th><th>宠物名</th><th>可配种宠物总数</th><th>自身蛋组数</th><th>具体蛋组</th></tr>
        </thead>
        <tbody id="rankingBody"></tbody>
    </table>
    <div class="pagination" id="paginationControls" style="display:none;">
        <button id="firstPageBtn" title="首页">⏮️</button>
        <button id="prevPageBtn" title="上一页">◀</button>
        <span id="pageNumbers"></span>
        <button id="nextPageBtn" title="下一页">▶</button>
        <button id="lastPageBtn" title="末页">⏭️</button>
        <div class="page-size-selector">
            <span>每页显示：</span>
            <select id="pageSizeSelect">
                <option value="15">15</option>
                <option value="30">30</option>
                <option value="50">50</option>
                <option value="all">全部</option>
            </select>
        </div>
    </div>
    <div class="info-text" id="rangeInfo"></div>
</div>
<script src="common.js"></script>
<script>
    let ranking = [];
    let currentPage = 1;
    let pageSize = 15;
    let totalPages = 1;
    let dataReady = false;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadEggData().then(data => {
        const stats = getTotalStats();
        document.getElementById('dataStatus').className = 'data-status';
        document.getElementById('dataStatus').textContent = `✅ 已加载 ${stats.totalPets} 只宠物 · 来源 BWIKI`;
        ranking = getStudRanking();
        dataReady = true;
        initFilterChips();
        filterAndRender();
    }).catch(err => {
        document.getElementById('dataStatus').className = 'data-status error';
        document.getElementById('dataStatus').innerHTML = `❌ 数据加载失败：${escapeHtml(err.message)} <a href="javascript:location.reload()" style="color:#2b5e2f;">重试</a>`;
    });

    let selectedGroups = new Set();
    let filteredRanking = [];

    function initFilterChips() {
        const container = document.getElementById('filterChips');
        const groups = getAllEggGroups().filter(g => g !== '无法孵蛋');
        document.getElementById('filterBar').style.display = 'flex';
        groups.forEach(g => {
            const chip = document.createElement('span');
            chip.className = 'filter-chip';
            chip.textContent = g;
            chip.addEventListener('click', () => {
                if (selectedGroups.has(g)) {
                    selectedGroups.delete(g);
                    chip.classList.remove('active');
                } else {
                    selectedGroups.add(g);
                    chip.classList.add('active');
                }
                currentPage = 1;
                filterAndRender();
            });
            container.appendChild(chip);
        });
        document.getElementById('clearFilterBtn').addEventListener('click', () => {
            selectedGroups.clear();
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            currentPage = 1;
            filterAndRender();
        });
    }

    function filterAndRender() {
        if (selectedGroups.size > 0) {
            filteredRanking = ranking.filter(p => p.groups.some(g => selectedGroups.has(g)));
        } else {
            filteredRanking = ranking;
        }
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('rankingBody');
        const data = filteredRanking;
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">暂无符合条件的种公</td></tr>';
            document.getElementById('paginationControls').style.display = 'none';
            document.getElementById('rangeInfo').innerHTML = '';
            return;
        }
        document.getElementById('paginationControls').style.display = 'flex';

        let start = (currentPage - 1) * pageSize;
        let end = start + pageSize;
        if (pageSize === 'all') { start = 0; end = data.length; }
        else {
            if (start >= data.length) {
                currentPage = Math.max(1, Math.ceil(data.length / pageSize));
                start = (currentPage - 1) * pageSize;
                end = start + pageSize;
            }
            if (end > data.length) end = data.length;
        }

        const pageData = data.slice(start, end);
        let html = '';
        pageData.forEach((item, idx) => {
            const globalIndex = start + idx + 1;
            html += `<tr class="pet-row" data-pet="${escapeHtml(item.name)}">
                        <td>${globalIndex}</td>
                        <td><strong>${escapeHtml(item.name)}</strong></td>
                        <td><span class="match-count">✨ ${item.matchCount}</span> 只</td>
                        <td><span class="groups-count">📦 ${item.groupsCount}</span> 个</td>
                        <td>${item.groups.map(g => escapeHtml(g)).join(' · ')}</td>
                      </tr>`;
        });
        tbody.innerHTML = html;

        document.querySelectorAll('.pet-row').forEach(row => {
            row.addEventListener('click', () => {
                let pet = row.getAttribute('data-pet');
                window.location.href = `index.html?pet=${encodeURIComponent(pet)}`;
            });
        });

        updatePaginationInfo(data.length);
        renderPageNumbers(data.length);
    }

    function updatePaginationInfo(total) {
        if (pageSize === 'all') {
            document.getElementById('rangeInfo').innerHTML = `显示第 1 - ${total} 条，共 ${total} 条`;
            return;
        }
        let start = (currentPage - 1) * pageSize + 1;
        let end = Math.min(currentPage * pageSize, total);
        document.getElementById('rangeInfo').innerHTML = `显示第 ${start} - ${end} 条，共 ${total} 条`;
    }

    function renderPageNumbers(total) {
        if (pageSize === 'all') { document.getElementById('pageNumbers').innerHTML = ''; return; }
        totalPages = Math.ceil(total / pageSize);
        const container = document.getElementById('pageNumbers');
        container.innerHTML = '';
        let startPage = Math.max(1, currentPage - 3);
        let endPage = Math.min(totalPages, currentPage + 3);
        if (endPage - startPage < 6) {
            if (startPage === 1) endPage = Math.min(totalPages, startPage + 6);
            if (endPage === totalPages) startPage = Math.max(1, endPage - 6);
        }
        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            if (i === currentPage) btn.classList.add('active-page');
            btn.addEventListener('click', () => { currentPage = i; renderTable(); });
            container.appendChild(btn);
        }
    }

    document.getElementById('firstPageBtn').addEventListener('click', () => { if (pageSize !== 'all') { currentPage = 1; renderTable(); } });
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (pageSize !== 'all' && currentPage > 1) { currentPage--; renderTable(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => { if (pageSize !== 'all' && currentPage < totalPages) { currentPage++; renderTable(); } });
    document.getElementById('lastPageBtn').addEventListener('click', () => { if (pageSize !== 'all') { currentPage = totalPages; renderTable(); } });
    document.getElementById('pageSizeSelect').addEventListener('change', function() {
        let v = this.value;
        pageSize = v === 'all' ? 'all' : parseInt(v, 10);
        currentPage = 1;
        renderTable();
    });
</script>
</body>
</html>
