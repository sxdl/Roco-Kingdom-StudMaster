<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>蛋组数据维护 - 安全增强版</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .toolbar { margin: 20px 0; display: flex; gap: 12px; flex-wrap: wrap; }
        .grid-view { overflow-x: auto; }
        .grid-view table { min-width: 800px; border-collapse: collapse; }
        .grid-view th, .grid-view td { border: 1px solid #ddd; padding: 8px; text-align: center; min-width: 100px; }
        .grid-view input { width: 100%; border: none; padding: 6px; box-sizing: border-box; }
        button.danger { background: #b54e3a; }
        button.danger:hover { background: #8c3c2b; }
        .password-overlay {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            margin: 3rem auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .password-overlay input {
            padding: 10px;
            font-size: 1rem;
            margin: 1rem;
            border-radius: 60px;
            border: 2px solid #cbdcc2;
            width: 80%;
        }
        .hidden { display: none; }
        .confirm-dialog {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .confirm-card {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .confirm-card input {
            margin: 1rem;
            padding: 8px;
            border-radius: 40px;
            border: 2px solid #ddd;
            width: 80%;
        }
        .warning {
            color: #d9534f;
            font-size: 0.8rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div id="mainContent" class="container hidden">
    <div style="text-align:center; font-size:0.7rem; padding: 1rem; color: #6f7c64;">
    🧪 非商用工具 | 数据基于洛克王国 | 禁止用于盈利性目的
</div>
    <h1>📝 蛋组数据管理</h1>
    <div class="nav-links">
        <a href="index.html">← 返回查询</a>
        <a href="stud.html">🏆 种公榜</a>
    </div>
    <div class="toolbar">
        <button id="addRowBtn">➕ 添加行</button>
        <button id="saveBtn" class="btn-gold">💾 保存修改</button>
        <button id="exportBtn">📁 导出JSON</button>
        <button id="downloadCsvBtn">📥 下载CSV模板</button>
        <input type="file" id="importCsvFile" accept=".csv" style="display:none">
        <button id="importCsvBtn">📂 导入CSV</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
        <button id="importBtn">📂 导入JSON</button>
        <button id="resetBtn" class="danger">⚠️ 重置初始数据（危险）</button>
    </div>
    <div class="grid-view" id="tableContainer"></div>
</div>

<div id="passwordPanel" class="password-overlay">
    <h2>🔐 管理员验证</h2>
    <p>请输入密码以访问数据维护页面</p>
    <input type="password" id="passwordInput" placeholder="密码">
    <br>
    <button id="submitPasswordBtn">确认</button>
    <div id="pwdError" style="color:red; margin-top:10px;"></div>
</div>

<script src="data.js"></script>
<script src="common.js"></script>
<script>
    let currentEggGroups = [];
    let currentTableData = [];
    let adminBinded = false;

    function loadFromStorage() {
        const data = getCurrentData();
        currentEggGroups = [...data.eggGroups];
        currentTableData = data.tableData.map(row => [...row]);
        renderTable();
    }

    // 检查数据中是否包含非法词（例如“删除行”）
    function hasInvalidData() {
        for (let row of currentTableData) {
            for (let cell of row) {
                if (typeof cell === 'string' && cell.includes('删除行')) {
                    return true;
                }
            }
        }
        return false;
    }

    function saveToStorage() {
        if (hasInvalidData()) {
            alert('❌ 数据中包含非法文字“删除行”，请修正后再保存。\n提示：使用“重置初始数据”或手动删除这些内容。');
            return;
        }
        saveData(currentEggGroups, currentTableData);
        alert('保存成功！请刷新主页面或种公榜查看更新。');
    }

    function renderTable() {
        const container = document.getElementById('tableContainer');
        let html = '<table border="1" cellpadding="6" style="border-collapse:collapse; width:100%"><thead><tr>';
        for (let group of currentEggGroups) {
            html += `<th>${escapeHtml(group)}</th>`;
        }
        html += '<th style="width:100px">操作</th></tr></thead><tbody>';
        for (let i = 0; i < currentTableData.length; i++) {
            html += '<tr>';
            for (let j = 0; j < currentEggGroups.length; j++) {
                let val = currentTableData[i][j] || '';
                // 如果值包含“删除行”，用红色边框警告
                const hasError = val.includes('删除行');
                const style = hasError ? 'style="background:#ffe0e0; border:1px solid red;"' : '';
                html += `<td ${style}><input type="text" value="${escapeHtml(val)}" data-row="${i}" data-col="${j}" placeholder="宠物名"></td>`;
            }
            html += `<td><button class="delRowBtn" data-row="${i}">❌ 删除行</button></td></tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;

        // 绑定输入变化
        document.querySelectorAll('input[data-row]').forEach(inp => {
            inp.addEventListener('change', (e) => {
                let row = parseInt(inp.dataset.row);
                let col = parseInt(inp.dataset.col);
                currentTableData[row][col] = inp.value;
                // 实时检查非法，若出现则高亮提示（可选）
                if (inp.value.includes('删除行')) {
                    inp.style.backgroundColor = '#ffe0e0';
                    inp.style.border = '1px solid red';
                } else {
                    inp.style.backgroundColor = '';
                    inp.style.border = '';
                }
            });
        });
        // 绑定删除行事件（带二次确认）
        document.querySelectorAll('.delRowBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let row = parseInt(btn.dataset.row);
                if (confirm(`确定要删除第 ${row+1} 行数据吗？此操作不可撤销（除非重新导入）。`)) {
                    currentTableData.splice(row, 1);
                    renderTable();
                }
            });
        });
    }

    function addRow() {
        let newRow = new Array(currentEggGroups.length).fill('');
        currentTableData.push(newRow);
        renderTable();
    }

    function exportJSON() {
        const exportObj = { eggGroups: currentEggGroups, tableData: currentTableData };
        const dataStr = JSON.stringify(exportObj, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'egg_data_backup.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function downloadCSV() {
        const rows = [currentEggGroups];
        for (let row of currentTableData) {
            const fullRow = row.slice();
            while (fullRow.length < currentEggGroups.length) fullRow.push('');
            rows.push(fullRow);
        }
        const csvContent = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], {type: 'text/csv;charset=utf-8;'});
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', 'egg_groups_data.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function importCSV(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const csvText = e.target.result;
                const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
                if (lines.length < 2) throw new Error('至少需要一行表头和一行动物数据');
                const parseRow = (line) => {
                    return line.split(',').map(cell => cell.replace(/^"|"$/g, '').replace(/""/g, '"'));
                };
                const header = parseRow(lines[0]);
                const dataRows = lines.slice(1).map(parseRow);
                const maxCols = header.length;
                const tableData = dataRows.map(row => {
                    const newRow = [...row];
                    while (newRow.length < maxCols) newRow.push('');
                    return newRow;
                });
                currentEggGroups = header;
                currentTableData = tableData;
                renderTable();
                alert('CSV导入成功，请点击“保存修改”以永久生效。');
            } catch (err) {
                alert('CSV解析失败：' + err.message);
            }
        };
        reader.readAsText(file, 'UTF-8');
    }

    function importJSON(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.eggGroups && imported.tableData) {
                    currentEggGroups = imported.eggGroups;
                    currentTableData = imported.tableData;
                    renderTable();
                    alert('导入成功，请点击保存生效。');
                } else {
                    alert('无效的JSON结构');
                }
            } catch (err) {
                alert('解析失败');
            }
        };
        reader.readAsText(file);
    }

    // 安全重置：需要输入“确认重置”
    function safeReset() {
        const modal = document.createElement('div');
        modal.className = 'confirm-dialog';
        modal.innerHTML = `
            <div class="confirm-card">
                <h3>⚠️ 危险操作 ⚠️</h3>
                <p>重置将<strong>永久丢失当前所有未保存的数据</strong>，恢复为初始的宠物蛋组列表。</p>
                <p>请输入 <strong style="color:#d32;">确认重置</strong> 以继续：</p>
                <input type="text" id="resetConfirmInput" placeholder="输入 确认重置">
                <div>
                    <button id="confirmResetYes" style="background:#b54e3a; color:white;">重置</button>
                    <button id="confirmResetNo" class="btn">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const input = modal.querySelector('#resetConfirmInput');
        const yesBtn = modal.querySelector('#confirmResetYes');
        const noBtn = modal.querySelector('#confirmResetNo');
        const closeModal = () => modal.remove();
        yesBtn.addEventListener('click', () => {
            if (input.value === '确认重置') {
                currentEggGroups = [...EGG_GROUPS];
                currentTableData = TABLE_DATA.map(row => [...row]);
                renderTable();
                alert('已重置为初始数据，请点击“保存修改”使变更永久生效。');
                closeModal();
            } else {
                alert('输入文字不正确，取消重置');
                closeModal();
            }
        });
        noBtn.addEventListener('click', closeModal);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') yesBtn.click();
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function bindAdminEvents() {
        if (adminBinded) return;
        adminBinded = true;
        document.getElementById('addRowBtn').addEventListener('click', addRow);
        document.getElementById('saveBtn').addEventListener('click', saveToStorage);
        document.getElementById('exportBtn').addEventListener('click', exportJSON);
        document.getElementById('downloadCsvBtn').addEventListener('click', downloadCSV);
        document.getElementById('importCsvBtn').addEventListener('click', () => {
            document.getElementById('importCsvFile').click();
        });
        document.getElementById('importCsvFile').addEventListener('change', (e) => {
            if (e.target.files.length) importCSV(e.target.files[0]);
            e.target.value = '';
        });
        document.getElementById('importBtn').addEventListener('click', () => {
            document.getElementById('importFile').click();
        });
        document.getElementById('importFile').addEventListener('change', (e) => {
            if (e.target.files.length) importJSON(e.target.files[0]);
            e.target.value = '';
        });
        document.getElementById('resetBtn').addEventListener('click', safeReset);
    }

    function showAdminPanel() {
        document.getElementById('passwordPanel').style.display = 'none';
        const main = document.getElementById('mainContent');
        main.classList.remove('hidden');
        loadFromStorage();
        bindAdminEvents();
    }

    function checkPassword() {
        const pwd = document.getElementById('passwordInput').value;
        if (pwd === '123') {
            showAdminPanel();
        } else {
            document.getElementById('pwdError').innerText = '密码错误，请重试';
            document.getElementById('passwordInput').value = '';
        }
    }

    document.getElementById('submitPasswordBtn').addEventListener('click', checkPassword);
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });
</script>
</body>
</html>
